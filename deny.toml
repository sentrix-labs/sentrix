# deny.toml — cargo-deny configuration for Sentrix
# https://embarkstudios.github.io/cargo-deny/

# ── Advisories ──────────────────────────────────────────────
# V6-M-02 FIX: advisories check re-enabled using cargo-deny v0.16+ simplified format.
# vulnerability/unmaintained/yanked keys were removed in v0.16 (PR #611).
# All advisories are denied by default; use ignore[] for known exceptions.
[advisories]
ignore = [
    # RUSTSEC-2020-0105 (net2) — cargo-deny v0.19.x has a parse bug on this
    # advisory file. The crate is not in our dependency tree; safe to ignore.
    "RUSTSEC-2020-0105",

    # GHSA-vxx9-2994-q338 / CVE-2026-32314 — yamux 0.12.1 remote-panic via
    # malformed Data frame (SYN, len=262145). Fix is in yamux 0.13.10,
    # which IS in our tree — `libp2p-yamux 0.47` pulls both 0.12.1 and
    # 0.13.10 unconditionally and the default `yamux::Config::default()`
    # constructs the `Config013` variant at connection setup, so the
    # vulnerable 0.12 decoder is never wired to a live socket at runtime.
    # Remove this ignore once libp2p-yamux 0.48+ drops v0.12 compat and
    # the 0.12.1 package disappears from Cargo.lock.
    # Dependabot alert: https://github.com/satyakwok/sentrix/security/dependabot/3
    "GHSA-vxx9-2994-q338",
]

# ── Licenses ────────────────────────────────────────────────
[licenses]
version = 2
confidence-threshold = 0.8

# Allow permissive licenses + BUSL-1.1 (Sentrix itself). Deny GPL, LGPL, AGPL, SSPL, etc.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "BUSL-1.1",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unlicense",
    "Unicode-3.0",
    "Zlib",
]

# ── Bans ────────────────────────────────────────────────────
[bans]
# Warn on duplicate crate versions (common in large dep trees)
multiple-versions = "warn"
# "allow" required for workspace path dependencies (path deps have wildcard version in Cargo.lock)
wildcards = "allow"
highlight = "all"

# Hard-ban unsafe/legacy crypto
deny = []

skip = [
    # secp256k1 and libp2p bring in different versions of common crates
    { name = "bitflags" },
    { name = "getrandom" },   # libp2p pulls in 0.2, 0.3, 0.4 transitively
    # libp2p transitive duplicates
    { name = "cpufeatures" },
    { name = "parking_lot" },
    { name = "parking_lot_core" },
    { name = "r-efi" },
    { name = "rand" },
    { name = "rand_chacha" },
    { name = "rand_core" },
    { name = "redox_syscall" },

    { name = "thiserror" },
    { name = "thiserror-impl" },
    { name = "tower" },
    { name = "unsigned-varint" },
    { name = "windows-sys" },
    { name = "yamux" },
]

# ── Sources ──────────────────────────────────────────────────
[sources]
# Only crates.io — no git dependencies allowed
unknown-registry = "deny"
unknown-git = "deny"
