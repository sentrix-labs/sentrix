services:
  sentrix-node:
    image: ghcr.io/sentrix-labs/sentrix:latest
    container_name: sentrix-node
    restart: unless-stopped
    ports:
      - "8545:8545"
      - "30303:30303"
    volumes:
      - sentrix-data:/data
    env_file:
      - .env
    environment:
      - SENTRIX_DATA_DIR=/data
      - RUST_LOG=info
    command: ["start"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  sentrix-data:
