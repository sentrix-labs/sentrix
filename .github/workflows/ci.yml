name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Run our pre-commit secret scanner against every staged-equivalent
      # file in the working tree. Mirrors .githooks/pre-commit so a
      # contributor who used `git commit --no-verify` can't sneak secrets
      # past CI.
      - name: Secret scan
        run: |
          set -e
          [ -x .githooks/pre-commit ] || chmod +x .githooks/pre-commit
          # Stage everything currently tracked so the hook sees it as "staged".
          # Hook scans staged blobs; we stage tracked content into a fresh tree.
          git add -A
          bash .githooks/pre-commit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/index
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Deny check
        # advisories skipped: cargo-deny v0.19.1 panics on CVSS 4.0 format (RUSTSEC-2026-0073 etc).
        # Track: https://github.com/EmbarkStudios/cargo-deny/issues
        run: cargo deny check licenses bans sources

      - name: Clippy
        run: cargo clippy --workspace --tests -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --workspace

      - name: Upload binary
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: sentrix-binary
          path: target/release/sentrix
          retention-days: 1

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: sentrix-binary
          path: ./release

      - name: Make binary executable
        run: chmod +x ./release/sentrix

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS1_SSH_KEY }}" > ~/.ssh/id_rsa_vps1
          chmod 600 ~/.ssh/id_rsa_vps1
          echo "${{ secrets.VPS2_SSH_KEY }}" > ~/.ssh/id_rsa_vps2
          chmod 600 ~/.ssh/id_rsa_vps2
          echo "${{ secrets.VPS3_SSH_KEY }}" > ~/.ssh/id_rsa_vps3
          chmod 600 ~/.ssh/id_rsa_vps3
          ssh-keyscan -H ${{ secrets.VPS1_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.VPS2_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.VPS3_HOST }} >> ~/.ssh/known_hosts

      # Phase 1: Upload binary to all VPS while nodes are still running
      - name: Upload binary to VPS1
        run: |
          scp -i ~/.ssh/id_rsa_vps1 ./release/sentrix \
            ${{ secrets.VPS1_USER }}@${{ secrets.VPS1_HOST }}:/tmp/sentrix_new

      - name: Upload binary to VPS2
        run: |
          scp -i ~/.ssh/id_rsa_vps2 ./release/sentrix \
            ${{ secrets.VPS2_USER }}@${{ secrets.VPS2_HOST }}:/tmp/sentrix_new

      - name: Upload binary to VPS3
        run: |
          scp -i ~/.ssh/id_rsa_vps3 ./release/sentrix \
            ${{ secrets.VPS3_USER }}@${{ secrets.VPS3_HOST }}:/tmp/sentrix_new

      # Phase 2: Archive previous binary + replace with new.
      # Binary file replaced on disk; the running process keeps using its
      # in-memory copy until restarted (Linux executes from the inode, not the path).
      # Archive keeps last 3 versions in /opt/sentrix/releases/ for instant rollback.
      - name: Replace binary VPS1
        run: |
          ssh -i ~/.ssh/id_rsa_vps1 ${{ secrets.VPS1_USER }}@${{ secrets.VPS1_HOST }} "
            sudo mkdir -p /opt/sentrix/releases
            PREV_VER=\$(/opt/sentrix/sentrix --version 2>/dev/null | awk '{print \$2}' || echo 'unknown')
            sudo cp /opt/sentrix/sentrix /opt/sentrix/releases/sentrix-v\${PREV_VER}-\$(date +%Y%m%d%H%M%S) 2>/dev/null || true
            cd /opt/sentrix/releases && ls -t | tail -n +4 | xargs -r sudo rm -f
            sudo mv /tmp/sentrix_new /opt/sentrix/sentrix
            sudo chmod +x /opt/sentrix/sentrix
            echo 'VPS1 binary archived + replaced'
          "

      - name: Replace binary VPS2
        run: |
          ssh -i ~/.ssh/id_rsa_vps2 ${{ secrets.VPS2_USER }}@${{ secrets.VPS2_HOST }} "
            sudo mkdir -p /opt/sentrix/releases
            PREV_VER=\$(/opt/sentrix/sentrix --version 2>/dev/null | awk '{print \$2}' || echo 'unknown')
            sudo cp /opt/sentrix/sentrix /opt/sentrix/releases/sentrix-v\${PREV_VER}-\$(date +%Y%m%d%H%M%S) 2>/dev/null || true
            cd /opt/sentrix/releases && ls -t | tail -n +4 | xargs -r sudo rm -f
            sudo mv /tmp/sentrix_new /opt/sentrix/sentrix
            sudo chmod +x /opt/sentrix/sentrix
            echo 'VPS2 binary archived + replaced'
          "

      - name: Replace binary VPS3
        run: |
          ssh -i ~/.ssh/id_rsa_vps3 ${{ secrets.VPS3_USER }}@${{ secrets.VPS3_HOST }} "
            sudo mkdir -p /opt/sentrix/releases
            PREV_VER=\$(/opt/sentrix/sentrix --version 2>/dev/null | awk '{print \$2}' || echo 'unknown')
            sudo cp /opt/sentrix/sentrix /opt/sentrix/releases/sentrix-v\${PREV_VER}-\$(date +%Y%m%d%H%M%S) 2>/dev/null || true
            cd /opt/sentrix/releases && ls -t | tail -n +4 | xargs -r sudo rm -f
            sudo mv /tmp/sentrix_new /opt/sentrix/sentrix
            sudo chmod +x /opt/sentrix/sentrix
            echo 'VPS3 binary archived + replaced'
          "

      # Phase 3: Rolling restart — one validator at a time so chain never stops.
      # PoA round-robin doesn't need supermajority, so 6 of 7 online keeps producing.
      # Each restart waits 30s for node to come back + sync before moving to next.

      - name: Rolling restart VPS3 (sentrix-core, validator 7/7)
        run: |
          ssh -i ~/.ssh/id_rsa_vps3 ${{ secrets.VPS3_USER }}@${{ secrets.VPS3_HOST }} "
            echo '== Rolling restart sentrix-core =='
            sudo systemctl restart sentrix-core
            echo 'restarted sentrix-core, waiting 30s for warm-up...'
            sleep 30
            curl -sf --max-time 10 http://localhost:8545/health > /dev/null && echo '  health OK' || (echo '  ERROR: health check failed' && exit 1)
          "

      - name: Rolling restart VPS2 validators (5 nodes, one at a time)
        run: |
          ssh -i ~/.ssh/id_rsa_vps2 ${{ secrets.VPS2_USER }}@${{ secrets.VPS2_HOST }} "
            for i in 1 2 3 4 5; do
              SVC=sentrix-val\$i
              PORT=\$((8544 + i))
              echo \"== Rolling restart \$SVC (port \$PORT) ==\"
              sudo systemctl restart \$SVC
              echo \"restarted \$SVC, waiting 30s for warm-up...\"
              sleep 30
              curl -sf --max-time 10 http://localhost:\$PORT/health > /dev/null && echo \"  \$SVC health OK\" || (echo \"  ERROR: \$SVC health check failed\" && exit 1)
            done
          "

      - name: Rolling restart VPS1 (sentrix-node, anchor — last)
        run: |
          ssh -i ~/.ssh/id_rsa_vps1 ${{ secrets.VPS1_USER }}@${{ secrets.VPS1_HOST }} "
            echo '== Rolling restart sentrix-node =='
            sudo systemctl restart sentrix-node
            echo 'restarted sentrix-node, waiting 30s for warm-up...'
            sleep 30
            curl -sf --max-time 10 http://localhost:8545/health > /dev/null && echo '  health OK' || (echo '  ERROR: health check failed' && exit 1)
          "

      # Phase 4: Rolling restart testnet validators (BFT — restart one at a time
      # so 3-of-4 supermajority keeps consensus alive).
      - name: Rolling restart VPS3 testnet validators
        run: |
          ssh -i ~/.ssh/id_rsa_vps3 ${{ secrets.VPS3_USER }}@${{ secrets.VPS3_HOST }} "
            for i in 1 2 3 4; do
              SVC=sentrix-testnet-val\$i
              PORT=\$((9544 + i))
              if sudo systemctl is-enabled \$SVC > /dev/null 2>&1; then
                echo \"== Rolling restart \$SVC (port \$PORT) ==\"
                sudo systemctl restart \$SVC
                echo \"restarted \$SVC, waiting 30s for warm-up...\"
                sleep 30
                curl -sf --max-time 10 http://localhost:\$PORT/health > /dev/null && echo \"  \$SVC health OK\" || echo \"  WARN: \$SVC health failed\"
              else
                echo \"\$SVC not enabled, skipping\"
              fi
            done
          "

      # Phase 5: Final cluster-wide health check.
      # Retry up to 5 times with 60s intervals.
      # Pass condition: in any window, the cluster MAX height advances by >= 1.
      # Round-robin PoA can have brief pauses during validator restart cycles
      # (a missed slot waits for the next validator's turn), so generous timeout.
      - name: Cluster health check
        run: |
          echo '--- Final cluster health check (retry up to 5 times, 60s windows) ---'
          sleep 10

          get_h() {
            curl -sf --max-time 10 "http://$1:8545/chain/info" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['height'])" 2>/dev/null || echo "0"
          }

          cluster_max() {
            H1=$(get_h ${{ secrets.VPS1_HOST }})
            H2=$(get_h ${{ secrets.VPS2_HOST }})
            H3=$(get_h ${{ secrets.VPS3_HOST }})
            echo "$H1 $H2 $H3" | tr ' ' '\n' | sort -n | tail -1
          }

          BASELINE=$(cluster_max)
          echo "Baseline cluster max height: $BASELINE"

          PASS=0
          for attempt in 1 2 3 4 5; do
            sleep 60
            CURRENT=$(cluster_max)
            DELTA=$((CURRENT - BASELINE))
            H1=$(get_h ${{ secrets.VPS1_HOST }})
            H2=$(get_h ${{ secrets.VPS2_HOST }})
            H3=$(get_h ${{ secrets.VPS3_HOST }})
            echo "[attempt $attempt] VPS1=$H1 VPS2=$H2 VPS3=$H3 (cluster_max=$CURRENT, delta=+$DELTA)"
            if [ "$DELTA" -ge 1 ]; then
              echo "Chain advanced by $DELTA blocks. Deploy successful."
              PASS=1
              break
            fi
          done

          if [ "$PASS" -ne 1 ]; then
            echo "ERROR: Chain has not produced any block in 5 minutes after deploy"
            exit 1
          fi
