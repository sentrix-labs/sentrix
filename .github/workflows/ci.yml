name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege defaults (CodeQL alerts #265, #266). Individual jobs
# opt in to additional scopes as needed; the top-level default denies
# everything so an accidental `uses:` that requests a scope we didn't
# intend cannot silently escalate. Adjust per-job `permissions:` to
# grant narrow access (e.g. `contents: write` only for release jobs).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Node 20 removed from GitHub-hosted runners 2026-09-16; default flipped
  # to Node 24 on 2026-06-02. Setting this explicitly silences the runtime
  # deprecation warning that `actions/{upload,download}-artifact@v5` emit
  # and pins us to the newer runtime ahead of the cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      # Run our pre-commit secret scanner against every staged-equivalent
      # file in the working tree. Mirrors .githooks/pre-commit so a
      # contributor who used `git commit --no-verify` can't sneak secrets
      # past CI.
      - name: Secret scan
        run: |
          set -e
          [ -x .githooks/pre-commit ] || chmod +x .githooks/pre-commit
          # Stage everything currently tracked so the hook sees it as "staged".
          # Hook scans staged blobs; we stage tracked content into a fresh tree.
          git add -A
          bash .githooks/pre-commit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/index
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-u2204-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Deny check
        # advisories skipped: cargo-deny v0.19.1 panics on CVSS 4.0 format (RUSTSEC-2026-0073 etc).
        # Track: https://github.com/EmbarkStudios/cargo-deny/issues
        run: cargo deny check licenses bans sources

      - name: Clippy
        run: cargo clippy --workspace --tests -- -D warnings

      - name: Build
        run: cargo build --workspace --release

      - name: Test
        run: cargo test --workspace

      - name: Upload binary
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v5
        with:
          name: sentrix-binary
          path: target/release/sentrix
          retention-days: 1

      - name: Upload faucet binary
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v5
        with:
          name: sentrix-faucet-binary
          path: target/release/sentrix-faucet
          retention-days: 1

  # RustSec advisory scan. Runs in parallel with Test so a newly-published
  # advisory against any transitive dep surfaces in ≤ 1 CI run rather than
  # waiting for the next manual `cargo audit` sweep. Ignore list mirrors
  # deny.toml — unreachable transitive vulns we've documented + reviewed.
  # Step wrapped in `|| true` so the check conclusion stays SUCCESS when
  # new advisories appear; they surface as `::warning::` annotations on
  # the PR instead of blocking the merge. Promote to blocking by dropping
  # the `|| true` once the backlog is clean and we can action new findings
  # within the SLO.
  audit:
    name: cargo audit (advisory scan)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/index
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2020-0105 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0105 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2024-0388 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2025-0055 \
            || echo "::warning::cargo audit findings (non-blocking, see deny.toml for ignored IDs)"

  # Second-layer secret scan — complements .githooks/pre-commit which only
  # runs on the contributor's machine. Gitleaks catches the case where
  # someone bypasses pre-commit with `--no-verify` or pushes from an
  # unsynced clone.
  #
  # Uses the gitleaks BINARY directly (free, open source) instead of
  # gitleaks-action@v2 — the Action requires a paid license for GitHub
  # organizations since 2023. The binary has no such restriction.
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # gitleaks needs full history for commit-range scan
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: Run gitleaks
        run: |
          gitleaks detect --source . --redact --verbose \
            || echo "::warning::gitleaks findings (non-blocking)"

  # Deploy job is disabled — deploys are now primary-pathed through
  # `scripts/fast-deploy.sh` on the build host, which builds locally (warm cargo
  # cache, ~1 min), pushes the branch to GitHub (this workflow picks
  # up the push as a test-only gate), and SCPs the binary across wg1
  # directly to validator nodes. Running this CI deploy in parallel would
  # double-restart every validator per push, which is harmless under
  # PoA but wastes time + GitHub Actions minutes. Re-enable by
  # removing the `if: false` guard below if the operator needs a
  # GitHub-Actions-native deploy path (e.g. build host unavailable).
  deploy:
    name: Deploy to VPS (disabled — see fast-deploy.sh)
    needs: test
    runs-on: ubuntu-22.04
    if: false && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download binary
        uses: actions/download-artifact@v5
        with:
          name: sentrix-binary
          path: ./release

      - name: Make binary executable
        run: chmod +x ./release/sentrix

      - name: Setup SSH
        run: |
          # NOTE: GitHub-side secret names (VPS1_SSH_KEY etc) still use the
          # legacy VPSn prefix because renaming repo secrets requires admin
          # access to Settings → Secrets. Repo owner can rename to
          # FOUNDATION_SSH_KEY / TREASURY_SSH_KEY / CORE_SSH_KEY and update
          # this file in the same commit. Code-side everywhere else uses
          # Foundation / Treasury / Core role names.
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS1_SSH_KEY }}" > ~/.ssh/id_rsa_foundation
          chmod 600 ~/.ssh/id_rsa_foundation
          echo "${{ secrets.VPS2_SSH_KEY }}" > ~/.ssh/id_rsa_treasury
          chmod 600 ~/.ssh/id_rsa_treasury
          echo "${{ secrets.VPS3_SSH_KEY }}" > ~/.ssh/id_rsa_core
          chmod 600 ~/.ssh/id_rsa_core
          ssh-keyscan -H ${{ secrets.VPS1_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.VPS2_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.VPS3_HOST }} >> ~/.ssh/known_hosts

      # Phase 1: Upload binary to all VPS while nodes are still running
      - name: Upload binary to Foundation node
        run: |
          scp -i ~/.ssh/id_rsa_foundation ./release/sentrix \
            ${{ secrets.VPS1_USER }}@${{ secrets.VPS1_HOST }}:/tmp/sentrix_new

      - name: Upload binary to Treasury node
        run: |
          scp -i ~/.ssh/id_rsa_treasury ./release/sentrix \
            ${{ secrets.VPS2_USER }}@${{ secrets.VPS2_HOST }}:/tmp/sentrix_new

      - name: Upload binary to Core node
        run: |
          scp -i ~/.ssh/id_rsa_core ./release/sentrix \
            ${{ secrets.VPS3_USER }}@${{ secrets.VPS3_HOST }}:/tmp/sentrix_new

      # Phase 2: Archive previous binary + replace with new.
      # Binary file replaced on disk; the running process keeps using its
      # in-memory copy until restarted (Linux executes from the inode, not the path).
      # Archive keeps last 3 versions in /opt/sentrix/releases/ for instant rollback.
      - name: Replace binary Foundation node
        run: |
          ssh -i ~/.ssh/id_rsa_foundation ${{ secrets.VPS1_USER }}@${{ secrets.VPS1_HOST }} "
            sudo mkdir -p /opt/sentrix/releases
            PREV_VER=\$(/opt/sentrix/sentrix --version 2>/dev/null | awk '{print \$2}' || echo 'unknown')
            sudo cp /opt/sentrix/sentrix /opt/sentrix/releases/sentrix-v\${PREV_VER}-\$(date +%Y%m%d%H%M%S) 2>/dev/null || true
            cd /opt/sentrix/releases && ls -t | tail -n +4 | xargs -r sudo rm -f
            sudo mv /tmp/sentrix_new /opt/sentrix/sentrix
            sudo chmod +x /opt/sentrix/sentrix
            echo 'Foundation node binary archived + replaced'
          "

      - name: Replace binary Treasury node
        run: |
          ssh -i ~/.ssh/id_rsa_treasury ${{ secrets.VPS2_USER }}@${{ secrets.VPS2_HOST }} "
            sudo mkdir -p /opt/sentrix/releases
            PREV_VER=\$(/opt/sentrix/sentrix --version 2>/dev/null | awk '{print \$2}' || echo 'unknown')
            sudo cp /opt/sentrix/sentrix /opt/sentrix/releases/sentrix-v\${PREV_VER}-\$(date +%Y%m%d%H%M%S) 2>/dev/null || true
            cd /opt/sentrix/releases && ls -t | tail -n +4 | xargs -r sudo rm -f
            sudo mv /tmp/sentrix_new /opt/sentrix/sentrix
            sudo chmod +x /opt/sentrix/sentrix
            echo 'Treasury node binary archived + replaced'
          "

      - name: Replace binary Core node
        run: |
          ssh -i ~/.ssh/id_rsa_core ${{ secrets.VPS3_USER }}@${{ secrets.VPS3_HOST }} "
            sudo mkdir -p /opt/sentrix/releases
            PREV_VER=\$(/opt/sentrix/sentrix --version 2>/dev/null | awk '{print \$2}' || echo 'unknown')
            sudo cp /opt/sentrix/sentrix /opt/sentrix/releases/sentrix-v\${PREV_VER}-\$(date +%Y%m%d%H%M%S) 2>/dev/null || true
            cd /opt/sentrix/releases && ls -t | tail -n +4 | xargs -r sudo rm -f
            sudo mv /tmp/sentrix_new /opt/sentrix/sentrix
            sudo chmod +x /opt/sentrix/sentrix
            echo 'Core node binary archived + replaced'
          "

      # Phase 3: Rolling restart TESTNET FIRST (canary) — a bad binary
      # shows up on testnet without touching mainnet. Only after testnet
      # health is green does Phase 4 touch the mainnet cluster.
      # BFT 4-val testnet keeps 3-of-4 supermajority during any single
      # restart, same safety argument as the PoA mainnet cluster below.
      - name: Rolling restart Core node testnet validators
        run: |
          ssh -i ~/.ssh/id_rsa_core ${{ secrets.VPS3_USER }}@${{ secrets.VPS3_HOST }} "
            for i in 1 2 3 4; do
              SVC=sentrix-testnet-val\$i
              PORT=\$((9544 + i))
              if sudo systemctl is-enabled \$SVC > /dev/null 2>&1; then
                echo \"== Rolling restart \$SVC (port \$PORT) ==\"
                sudo systemctl restart \$SVC
                echo \"restarted \$SVC, waiting 30s for warm-up...\"
                sleep 30
                curl -sf --max-time 10 http://localhost:\$PORT/health > /dev/null && echo \"  \$SVC health OK\" || echo \"  WARN: \$SVC health failed\"
              else
                echo \"\$SVC not enabled, skipping\"
              fi
            done
          "

      # Testnet health gate — require testnet height to advance by ≥ 1 block
      # inside a 60 s window before allowing mainnet rollout. If testnet is
      # stuck for any reason (BFT livelock, disk full, crash loop), we'd
      # rather halt here than propagate the binary to mainnet.
      - name: Testnet health gate
        run: |
          ssh -i ~/.ssh/id_rsa_core ${{ secrets.VPS3_USER }}@${{ secrets.VPS3_HOST }} "
            START_H=\$(curl -sf --max-time 5 http://localhost:9545/chain/info | grep -oE '\"height\":[0-9]+' | cut -d: -f2)
            echo \"testnet height start: \$START_H\"
            sleep 60
            END_H=\$(curl -sf --max-time 5 http://localhost:9545/chain/info | grep -oE '\"height\":[0-9]+' | cut -d: -f2)
            echo \"testnet height after 60s: \$END_H\"
            if [ \"\$END_H\" -gt \"\$START_H\" ]; then
              echo 'testnet health OK — height advanced'
            else
              echo 'ERROR: testnet height did not advance in 60s — aborting mainnet rollout'
              exit 1
            fi
          "

      # Phase 4: Rolling restart MAINNET — one validator at a time so chain
      # never stops. Mainnet has 3 PoA validators (Foundation Foundation node, Treasury
      # Treasury node, Core Core node). PoA round-robin keeps producing with 2 of 3 online
      # during any single validator's restart. Each restart waits 30s for
      # node to come back + sync before moving to the next.

      - name: Rolling restart Core node (sentrix-core, Sentrix Core)
        run: |
          ssh -i ~/.ssh/id_rsa_core ${{ secrets.VPS3_USER }}@${{ secrets.VPS3_HOST }} "
            echo '== Rolling restart sentrix-core =='
            sudo systemctl restart sentrix-core
            echo 'restarted sentrix-core, waiting 30s for warm-up...'
            sleep 30
            curl -sf --max-time 10 http://localhost:8545/health > /dev/null && echo '  health OK' || (echo '  ERROR: health check failed' && exit 1)
          "

      # Only sentrix-val5 (Sentrix Treasury) is live on Treasury node in v2.0.0.
      # sentrix-val{1..4} are the decommissioned Nusantara/BlockForge/
      # PacificStake/Archipelago validators — unit files remain on disk
      # but services are stopped; must NOT be restarted.
      - name: Rolling restart Treasury node (sentrix-val5, Sentrix Treasury)
        run: |
          ssh -i ~/.ssh/id_rsa_treasury ${{ secrets.VPS2_USER }}@${{ secrets.VPS2_HOST }} "
            echo '== Rolling restart sentrix-val5 =='
            sudo systemctl restart sentrix-val5
            echo 'restarted sentrix-val5, waiting 30s for warm-up...'
            sleep 30
            curl -sf --max-time 10 http://localhost:8549/health > /dev/null && echo '  health OK' || (echo '  ERROR: health check failed' && exit 1)
          "

      - name: Rolling restart Foundation node (sentrix-node, anchor — last)
        run: |
          ssh -i ~/.ssh/id_rsa_foundation ${{ secrets.VPS1_USER }}@${{ secrets.VPS1_HOST }} "
            echo '== Rolling restart sentrix-node =='
            sudo systemctl restart sentrix-node
            echo 'restarted sentrix-node, waiting 30s for warm-up...'
            sleep 30
            curl -sf --max-time 10 http://localhost:8545/health > /dev/null && echo '  health OK' || (echo '  ERROR: health check failed' && exit 1)
          "

      # Phase 5: Final cluster-wide health check.
      # Retry up to 5 times with 60s intervals.
      # Pass condition: in any window, the cluster MAX height advances by >= 1.
      # Round-robin PoA can have brief pauses during validator restart cycles
      # (a missed slot waits for the next validator's turn), so generous timeout.
      - name: Cluster health check
        run: |
          echo '--- Final cluster health check (retry up to 5 times, 60s windows) ---'
          sleep 10

          # Foundation node sentrix-node and Core node sentrix-core listen on 8545.
          # Treasury node sentrix-val5 listens on 8549 (shared host with decommissioned
          # validators that used 8545-8548 ports).
          get_h() {
            curl -sf --max-time 10 "http://$1:$2/chain/info" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['height'])" 2>/dev/null || echo "0"
          }

          cluster_max() {
            H1=$(get_h ${{ secrets.VPS1_HOST }} 8545)
            H2=$(get_h ${{ secrets.VPS2_HOST }} 8549)
            H3=$(get_h ${{ secrets.VPS3_HOST }} 8545)
            echo "$H1 $H2 $H3" | tr ' ' '\n' | sort -n | tail -1
          }

          BASELINE=$(cluster_max)
          echo "Baseline cluster max height: $BASELINE"

          PASS=0
          for attempt in 1 2 3 4 5; do
            sleep 60
            CURRENT=$(cluster_max)
            DELTA=$((CURRENT - BASELINE))
            H1=$(get_h ${{ secrets.VPS1_HOST }} 8545)
            H2=$(get_h ${{ secrets.VPS2_HOST }} 8549)
            H3=$(get_h ${{ secrets.VPS3_HOST }} 8545)
            echo "[attempt $attempt] Foundation node=$H1 Treasury node=$H2 Core node=$H3 (cluster_max=$CURRENT, delta=+$DELTA)"
            if [ "$DELTA" -ge 1 ]; then
              echo "Chain advanced by $DELTA blocks. Deploy successful."
              PASS=1
              break
            fi
          done

          if [ "$PASS" -ne 1 ]; then
            echo "ERROR: Chain has not produced any block in 5 minutes after deploy"
            exit 1
          fi
