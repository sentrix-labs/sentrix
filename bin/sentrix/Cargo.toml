[package]
name = "sentrix-node"
version = "1.5.0"
edition = "2024"
license = "BUSL-1.1"
description = "Sentrix blockchain node CLI"
publish = false

[[bin]]
name = "sentrix"
path = "src/main.rs"

[lints.clippy]
unwrap_used    = "deny"
expect_used    = "deny"
panic          = "deny"

[dependencies]
sentrix = { path = "../.." }

# CLI
clap = { version = "4.0", features = ["derive"] }
anyhow = "1.0"

# Async
tokio = { version = "1.0", features = ["full"] }

# Networking (for Multiaddr/Keypair types used in startup)
libp2p = { version = "0.56", features = ["tcp", "noise", "yamux", "gossipsub", "kad", "identify", "tokio", "request-response", "macros"] }

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Used directly in main.rs
serde_json = "1.0"
hex = "0.4"
axum = "0.8"
bincode = "1.3"
