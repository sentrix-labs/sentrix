[package]
name = "sentrix-node"
version = "2.1.32"
edition = "2024"
license = "BUSL-1.1"
description = "Sentrix blockchain node CLI"
publish = false

[[bin]]
name = "sentrix"
path = "src/main.rs"

[lints.clippy]
unwrap_used    = "deny"
expect_used    = "deny"
panic          = "deny"

[dependencies]
sentrix = { path = "../.." }

# CLI
clap = { version = "4.6", features = ["derive"] }
anyhow = "1.0"

# Async
tokio = { version = "1.52", features = ["full"] }

# Networking (for Multiaddr/Keypair types used in startup)
libp2p = { version = "0.56", features = ["tcp", "noise", "yamux", "gossipsub", "kad", "identify", "tokio", "request-response", "macros"] }

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Used directly in main.rs
serde_json = "1.0"
hex = "0.4"
axum = "0.8"
bincode = "1.3"
# L1 peer auto-discovery: validator-loop builds + signs MultiaddrAdvertisement
# directly using its own keystore, so we pull sentrix-wire here rather than
# routing through the network crate (which would force the binary to know
# about sentrix-network's wire types via a long re-export chain).
sentrix-wire = { path = "../../crates/sentrix-wire" }
# V2 M-15 helper uses the SecretKey type from secp256k1 in its signature.
# The wallet crate returns the same type from `get_secret_key`, but bin/
# doesn't transitively re-export it, so we depend on the workspace version
# directly. Pinned to match sentrix-wallet / sentrix-bft to avoid two
# incompatible copies.
secp256k1 = { version = "0.31", features = ["rand", "recovery", "serde"] }
# Wraps the env-var validator key so the source `String`'s heap allocation
# is wiped after we derive the `Wallet` (C-06 hardening).
zeroize = "1.7"
